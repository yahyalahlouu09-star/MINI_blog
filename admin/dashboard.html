<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tableau de bord</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-layout">

  <!-- ======== MENU GAUCHE ======== -->
  <aside class="admin-menu">
    <a href="dashboard.html" class="logo-menu">Minimal<span>Blog</span></a>
    <div class="section-titre">Navigation</div>
    <a href="dashboard.html" class="actif">📊 Tableau de bord</a>
    <a href="articles.html">📝 Articles</a>
    <a href="commentaires.html">💬 Commentaires</a>
    <div class="section-titre">Actions</div>
    <a href="../index.html" target="_blank">🌐 Voir le blog</a>
    <a href="#" onclick="deconnecter()">🚪 Déconnexion</a>
  </aside>

  <!-- ======== CONTENU PRINCIPAL ======== -->
  <div class="admin-corps">

    <div class="admin-barre">
      <h2>Tableau de bord</h2>
      <span style="font-size:0.85rem; color:#64748b;">Connecté en tant qu'admin</span>
    </div>

    <div class="admin-contenu">

      <!-- Cartes statistiques -->
      <div class="stats-grille" id="statistiques"></div>

      <!-- Deux colonnes : articles récents + commentaires en attente -->
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">

        <div>
          <h3 style="font-size:1rem; margin-bottom:12px; color:#222;">📝 Articles récents</h3>
          <div id="articlesRecents"></div>
        </div>

        <div>
          <h3 style="font-size:1rem; margin-bottom:12px; color:#222;">⏳ Commentaires en attente</h3>
          <div id="commentairesAttente"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script>
  DB.init();

  // Protection : si pas connecté, retour login
  if (!DB.isLoggedIn()) window.location.href = 'login.html';

  // ============================================================
  // STATISTIQUES
  // ============================================================
  var tousArticles  = DB.getArticles();
  var publies       = DB.getArticles('publie');
  var brouillons    = DB.getArticles('brouillon');
  var tousComms     = DB.getCommentaires();
  var enAttente     = DB.getCommentaires(null, false);

  var stats = [
    { nombre: tousArticles.length, label: 'Total articles',    icone: '📝' },
    { nombre: publies.length,      label: 'Publiés',           icone: '✅' },
    { nombre: brouillons.length,   label: 'Brouillons',        icone: '✏️' },
    { nombre: tousComms.length,    label: 'Commentaires',      icone: '💬' },
    { nombre: enAttente.length,    label: 'En attente',        icone: '⏳' },
    { nombre: DB.getCategories().length, label: 'Catégories', icone: '🏷️' }
  ];

  document.getElementById('statistiques').innerHTML = stats.map(function(s) {
    return '' +
      '<div class="stat-boite">' +
        '<span class="stat-icone">' + s.icone + '</span>' +
        '<div class="stat-chiffre">' + s.nombre + '</div>' +
        '<div class="stat-label">' + s.label + '</div>' +
      '</div>';
  }).join('');

  // ============================================================
  // ARTICLES RÉCENTS
  // ============================================================
  document.getElementById('articlesRecents').innerHTML = tousArticles.slice(0, 5).map(function(a) {
    return '' +
      '<div style="background:white; border:1px solid #e2e8f0; border-radius:7px; padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">' +
        '<div>' +
          '<div style="font-size:0.88rem; font-weight:bold; color:#222; margin-bottom:2px;">' + escapeHtml(a.titre.substring(0, 44)) + (a.titre.length > 44 ? '…' : '') + '</div>' +
          '<div style="font-size:0.75rem; color:#888;">' + formatDateShort(a.date_publication) + ' · ' + escapeHtml(a.auteur) + '</div>' +
        '</div>' +
        '<span class="etiq ' + (a.statut === 'publie' ? 'etiq-vert' : 'etiq-jaune') + '">' + (a.statut === 'publie' ? 'Publié' : 'Brouillon') + '</span>' +
      '</div>';
  }).join('') || '<div class="vide" style="padding:15px;">Aucun article.</div>';

  // ============================================================
  // COMMENTAIRES EN ATTENTE
  // ============================================================
  document.getElementById('commentairesAttente').innerHTML = enAttente.slice(0, 4).map(function(c) {
    return '' +
      '<div style="background:white; border:1px solid #e2e8f0; border-left:3px solid #f59e0b; border-radius:7px; padding:12px 14px; margin-bottom:8px;">' +
        '<div style="display:flex; justify-content:space-between; margin-bottom:4px;">' +
          '<strong style="font-size:0.85rem;">👤 ' + escapeHtml(c.pseudo) + '</strong>' +
          '<span style="font-size:0.75rem; color:#888;">' + formatDateShort(c.date_commentaire) + '</span>' +
        '</div>' +
        '<div style="font-size:0.82rem; color:#555; margin-bottom:8px;">' + escapeHtml(c.contenu.substring(0, 75)) + '…</div>' +
        '<div style="display:flex; gap:6px;">' +
          '<button class="btn btn-vert btn-petit" onclick="approuver(' + c.id + ')">✓ Approuver</button>' +
          '<button class="btn btn-rouge btn-petit" onclick="supprimer(' + c.id + ')">✗ Supprimer</button>' +
        '</div>' +
      '</div>';
  }).join('') || '<div class="vide" style="padding:15px;">🎉 Aucun commentaire en attente !</div>';

  function approuver(id) { DB.approuverCommentaire(id); showNotification('Commentaire approuvé !'); location.reload(); }
  function supprimer(id) { if (confirm('Supprimer ce commentaire ?')) { DB.supprimerCommentaire(id); showNotification('Supprimé.', 'error'); location.reload(); } }
  function deconnecter() { DB.logout(); window.location.href = 'login.html'; }
</script>
</body>
</html>
