<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Commentaires</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Boutons d'onglets */
    .onglet {
      padding: 7px 16px;
      border: 1px solid #ddd;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }
    .onglet:first-child { border-radius: 5px 0 0 5px; }
    .onglet:last-child  { border-radius: 0 5px 5px 0; }
    .onglet.actif { background: #3b82f6; color: white; border-color: #3b82f6; }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- ======== MENU GAUCHE ======== -->
  <aside class="admin-menu">
    <a href="dashboard.html" class="logo-menu">Minimal<span>Blog</span></a>
    <div class="section-titre">Navigation</div>
    <a href="dashboard.html">📊 Tableau de bord</a>
    <a href="articles.html">📝 Articles</a>
    <a href="commentaires.html" class="actif">💬 Commentaires</a>
    <div class="section-titre">Actions</div>
    <a href="../index.html" target="_blank">🌐 Voir le blog</a>
    <a href="#" onclick="deconnecter()">🚪 Déconnexion</a>
  </aside>

  <!-- ======== CONTENU PRINCIPAL ======== -->
  <div class="admin-corps">

    <div class="admin-barre">
      <h2>Modération des Commentaires</h2>
      <!-- Indicateur de commentaires en attente -->
      <div id="indicateur" style="padding:4px 14px; border-radius:20px; font-size:0.82rem; font-weight:bold;"></div>
    </div>

    <div class="admin-contenu">

      <!-- Onglets de filtre -->
      <div style="margin-bottom:18px;">
        <button class="onglet" id="ong1" onclick="filtrer('attente')">⏳ En attente</button>
        <button class="onglet" id="ong2" onclick="filtrer('approuves')">✅ Approuvés</button>
        <button class="onglet" id="ong3" onclick="filtrer('tous')">📋 Tous</button>
      </div>

      <!-- Tableau des commentaires -->
      <div class="tableau-wrap">
        <table class="tableau">
          <thead>
            <tr>
              <th>#</th>
              <th>Article</th>
              <th>Auteur</th>
              <th>Commentaire</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="corps-tableau">
            <tr><td colspan="7" class="vide">Chargement…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script>
  DB.init();
  if (!DB.isLoggedIn()) window.location.href = 'login.html';

  var ongletActif = 'attente';

  // ============================================================
  // CHANGER D'ONGLET
  // ============================================================
  function filtrer(onglet) {
    ongletActif = onglet;

    // Mettre à jour les onglets (actif / inactif)
    document.getElementById('ong1').classList.toggle('actif', onglet === 'attente');
    document.getElementById('ong2').classList.toggle('actif', onglet === 'approuves');
    document.getElementById('ong3').classList.toggle('actif', onglet === 'tous');

    chargerTableau();
  }

  // ============================================================
  // CHARGER LE TABLEAU
  // ============================================================
  function chargerTableau() {
    var commentaires;

    if (ongletActif === 'attente')   commentaires = DB.getCommentaires(null, false);
    else if (ongletActif === 'approuves') commentaires = DB.getCommentaires(null, true);
    else                             commentaires = DB.getCommentaires();

    // Mettre à jour l'indicateur
    var nbAttente = DB.getCommentaires(null, false).length;
    var indic = document.getElementById('indicateur');
    indic.textContent       = nbAttente > 0 ? nbAttente + ' en attente' : '✓ Tout à jour';
    indic.style.background  = nbAttente > 0 ? '#fef3c7' : '#dcfce7';
    indic.style.color       = nbAttente > 0 ? '#a16207' : '#16a34a';
    indic.style.border      = '1px solid ' + (nbAttente > 0 ? '#fde68a' : '#86efac');

    var corps = document.getElementById('corps-tableau');

    if (commentaires.length === 0) {
      corps.innerHTML = '<tr><td colspan="7" class="vide">Aucun commentaire.</td></tr>';
      return;
    }

    corps.innerHTML = commentaires.map(function(c) {
      var article = DB.getArticleById(c.article_id);

      return '' +
        '<tr>' +
          '<td style="color:#888; font-weight:bold;">' + c.id + '</td>' +
          '<td style="max-width:130px; font-size:0.82rem;">' +
            (article
              ? '<a href="../article.html?id=' + article.id + '" target="_blank" style="color:#3b82f6;">' + escapeHtml(article.titre.substring(0, 35)) + '…</a>'
              : '—'
            ) +
          '</td>' +
          '<td>' +
            '<div style="display:flex; align-items:center; gap:6px;">' +
              '<span class="initiales" style="width:24px;height:24px;font-size:0.6rem;display:inline-flex;">' + initials(c.pseudo) + '</span>' +
              '<strong style="font-size:0.85rem;">' + escapeHtml(c.pseudo) + '</strong>' +
            '</div>' +
          '</td>' +
          '<td style="max-width:200px; font-size:0.84rem; color:#444;">' + escapeHtml(c.contenu.substring(0, 80)) + (c.contenu.length > 80 ? '…' : '') + '</td>' +
          '<td style="font-size:0.8rem; color:#888;">' + formatDateShort(c.date_commentaire) + '</td>' +
          '<td>' +
            '<span class="etiq ' + (c.approuve ? 'etiq-vert' : 'etiq-jaune') + '">' +
              (c.approuve ? '✅ Approuvé' : '⏳ En attente') +
            '</span>' +
          '</td>' +
          '<td>' +
            '<div class="actions-groupe">' +
              (!c.approuve ? '<button class="btn btn-vert btn-petit" onclick="approuver(' + c.id + ')">✓</button>' : '') +
              '<button class="btn btn-rouge btn-petit" onclick="supprimer(' + c.id + ')">🗑</button>' +
            '</div>' +
          '</td>' +
        '</tr>';
    }).join('');
  }

  // Démarrer sur l'onglet "En attente"
  filtrer('attente');

  function approuver(id) { DB.approuverCommentaire(id); showNotification('✅ Commentaire approuvé !'); chargerTableau(); }
  function supprimer(id) {
    if (!confirm('Supprimer ce commentaire ?')) return;
    DB.supprimerCommentaire(id);
    showNotification('Supprimé.', 'error');
    chargerTableau();
  }
  function deconnecter() { DB.logout(); window.location.href = 'login.html'; }
</script>
</body>
</html>
