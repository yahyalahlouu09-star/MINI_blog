<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Commentaires</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .tab-btn { padding:0.65rem 1.4rem;border:none;background:transparent;color:var(--gris);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;transition:all 0.2s; }
    .tab-btn.active { background:var(--teal);color:var(--navy);font-weight:700; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Minimal<span>Blog</span></div>
    <div class="sidebar-section">Navigation</div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html">📊 Tableau de bord</a></li>
      <li><a href="articles.html">📝 Articles</a></li>
      <li><a href="commentaires.html" class="active">💬 Commentaires</a></li>
    </ul>
    <div class="sidebar-section" style="margin-top:1.5rem">Actions</div>
    <ul class="sidebar-nav">
      <li><a href="../index.html" target="_blank">🌐 Voir le blog</a></li>
      <li><a href="#" onclick="doLogout()">🚪 Déconnexion</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h2>Modération des Commentaires</h2>
      <div id="pendingBadge" style="padding:0.35rem 1rem;border-radius:20px;font-size:0.82rem;font-weight:600"></div>
    </div>

    <div class="admin-content">
      <!-- Onglets -->
      <div style="display:flex;gap:0;margin-bottom:1.5rem;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content">
        <button class="tab-btn" id="t1" onclick="filtrer('pending')">⏳ En attente</button>
        <button class="tab-btn" id="t2" onclick="filtrer('approved')">✅ Approuvés</button>
        <button class="tab-btn" id="t3" onclick="filtrer('all')">📋 Tous</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Article</th>
              <th>Auteur</th>
              <th>Email</th>
              <th>Commentaire</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="8" class="empty-state">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  let filtre = 'pending';
  let articlesCache = {};

  // Auth + init
  (async function() {
    const { isAdmin } = await fetch('/api/auth/check').then(r => r.json()).catch(() => ({ isAdmin: false }));
    if (!isAdmin) { sessionStorage.removeItem('mb2_logged'); window.location.href = 'login.html'; return; }
    sessionStorage.setItem('mb2_logged', 'true');
    await filtrer('pending');
  })();

  async function filtrer(f) {
    filtre = f;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(f === 'pending' ? 't1' : f === 'approved' ? 't2' : 't3').classList.add('active');
    await charger();
  }

  async function charger() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Chargement…</td></tr>';

    // Commentaires filtrés
    let coms;
    if (filtre === 'pending')  coms = await DB.getCommentaires(null, false);
    else if (filtre === 'approved') coms = await DB.getCommentaires(null, true);
    else coms = await DB.getCommentaires();

    // Badge en attente
    const pending = (filtre !== 'pending') ? await DB.getCommentaires(null, false) : coms;
    const nbPending = (filtre !== 'pending') ? pending.length : coms.length;
    const badge = document.getElementById('pendingBadge');
    const pendingCount = filtre === 'pending' ? coms.length :
      (await DB.getCommentaires(null, false)).length;
    badge.textContent   = pendingCount > 0 ? `${pendingCount} en attente` : '✓ À jour';
    badge.style.background = pendingCount > 0 ? 'rgba(245,166,35,0.15)' : 'rgba(0,212,168,0.12)';
    badge.style.color      = pendingCount > 0 ? 'var(--gold)' : 'var(--teal)';
    badge.style.border     = `1px solid ${pendingCount > 0 ? 'rgba(245,166,35,0.3)' : 'rgba(0,212,168,0.3)'}`;

    if (!coms.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Aucun commentaire.</td></tr>';
      return;
    }

    // Charger les articles manquants
    const artIds = [...new Set(coms.map(c => c.article_id))];
    await Promise.all(artIds.map(async id => {
      if (!articlesCache[id]) {
        articlesCache[id] = await DB.getArticleById(id);
      }
    }));

    tbody.innerHTML = coms.map(c => {
      const art = articlesCache[c.article_id];
      return `
        <tr>
          <td style="color:var(--gris);font-weight:600">${c.id}</td>
          <td style="max-width:140px;font-size:0.82rem">
            ${art
              ? `<a href="../article.html?id=${art.id}" target="_blank" style="color:var(--teal)">${escapeHtml(art.titre.substring(0, 38))}…</a>`
              : '—'
            }
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div class="author-avatar" style="width:26px;height:26px;font-size:0.65rem">${initials(c.pseudo)}</div>
              <span style="font-weight:600;font-size:0.85rem">${escapeHtml(c.pseudo)}</span>
            </div>
          </td>
          <td style="font-size:0.8rem;color:var(--gris)">${escapeHtml(c.email || '—')}</td>
          <td style="max-width:200px;font-size:0.85rem;color:var(--blanc2)">
            ${escapeHtml(c.contenu.substring(0, 80))}${c.contenu.length > 80 ? '…' : ''}
          </td>
          <td style="font-size:0.8rem;color:var(--gris)">${formatDateShort(c.date_commentaire)}</td>
          <td><span class="badge badge-${c.approuve ? 'approved' : 'pending'}">${c.approuve ? '✅ Approuvé' : '⏳ En attente'}</span></td>
          <td>
            <div class="actions">
              ${!c.approuve ? `<button class="btn btn-success btn-sm" onclick="approuver(${c.id})">✓</button>` : ''}
              <button class="btn btn-danger btn-sm" onclick="supprimer(${c.id})">🗑</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function approuver(id) {
    await DB.approuverCommentaire(id);
    showNotification('✅ Commentaire approuvé !');
    await charger();
  }

  async function supprimer(id) {
    if (!confirm('Supprimer ce commentaire définitivement ?')) return;
    await DB.supprimerCommentaire(id);
    showNotification('Commentaire supprimé.', 'error');
    await charger();
  }

  async function doLogout() {
    await DB.logout();
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
