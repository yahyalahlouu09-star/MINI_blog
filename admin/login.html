<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Connexion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page-login">
  <div class="boite-login">

    <!-- Logo -->
    <div class="logo" style="margin-bottom:5px;">Minimal<span>Blog</span></div>
    <p style="color:#888; font-size:0.9rem; margin-bottom:20px;">Espace administration</p>

    <!-- Message d'erreur -->
    <div id="msgErreur" class="alerte alerte-err" style="display:none;">❌ Identifiants incorrects.</div>

    <div class="champ">
      <label>Login</label>
      <input type="text" id="champLogin" value="admin">
    </div>

    <div class="champ">
      <label>Mot de passe</label>
      <input type="password" id="champMdp" value="admin123">
    </div>

    <button class="btn btn-bleu" style="width:100%; margin-top:5px;" onclick="seConnecter()">
      Se connecter →
    </button>

    <div style="text-align:center; margin-top:18px;">
      <a href="../index.html" style="color:#888; font-size:0.85rem;">← Retour au blog</a>
    </div>

    <!-- Info de démo -->
    <div style="margin-top:18px; padding:10px 14px; background:#f0f7ff; border:1px solid #bfdbfe; border-radius:5px; font-size:0.8rem; color:#555;">
      <strong style="color:#3b82f6;">Démo :</strong> login = admin &nbsp;/&nbsp; mot de passe = admin123
    </div>

  </div>
</div>

<script src="../js/db.js"></script>
<script>
  DB.init();

  // Si déjà connecté, aller au dashboard
  if (DB.isLoggedIn()) window.location.href = 'dashboard.html';

  function seConnecter() {
    var login = document.getElementById('champLogin').value.trim();
    var mdp   = document.getElementById('champMdp').value;
    var err   = document.getElementById('msgErreur');

    err.style.display = 'none';

    if (DB.login(login, mdp)) {
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
    }
  }

  // Connexion en appuyant sur Entrée
  document.getElementById('champMdp').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') seConnecter();
  });
</script>
</body>
</html>
