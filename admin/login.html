<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Connexion</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <span class="logo">Minimal<span>Blog</span></span>
    <p>Espace d'administration protégé</p>

    <div id="errMsg" class="alert alert-error" style="display:none">❌ Identifiants incorrects.</div>

    <div class="form-group">
      <label>Login</label>
      <input type="text" id="login" value="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" value="admin123" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btnLogin"
      style="width:100%;justify-content:center;margin-top:0.5rem" onclick="seConnecter()">
      Se connecter →
    </button>
    <div style="margin-top:1.5rem;text-align:center">
      <a href="../index.html" style="color:var(--gris);font-size:0.85rem">← Retour au blog</a>
    </div>
    <div style="margin-top:1.5rem;padding:0.9rem;background:rgba(15,244,198,0.06);border:1px solid rgba(15,244,198,0.15);border-radius:8px;font-size:0.8rem;color:var(--gris)">
      <strong style="color:var(--teal)">Démo :</strong> admin / admin123
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  // Si déjà connecté côté serveur, rediriger
  (async function() {
    const { isAdmin } = await fetch('/api/auth/check').then(r => r.json()).catch(() => ({ isAdmin: false }));
    if (isAdmin) {
      sessionStorage.setItem('mb2_logged', 'true');
      window.location.href = 'dashboard.html';
    }
  })();

  async function seConnecter() {
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errMsg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Connexion…';

    const login      = document.getElementById('login').value.trim();
    const password   = document.getElementById('password').value;
    const ok = await DB.login(login, password);

    if (ok) {
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
    }
  }

  document.getElementById('password').addEventListener('keyup', e => {
    if (e.key === 'Enter') seConnecter();
  });
</script>
</body>
</html>
