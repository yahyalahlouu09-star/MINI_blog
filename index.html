<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header>
  <a href="index.html" class="logo">Minimal<span>Blog</span></a>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="#articles">Articles</a>
    <button class="btn-ecrire" onclick="ouvrirModal()">✏️ Écrire</button>
    <a href="admin/login.html" class="btn-admin">⚡ Admin</a>
  </nav>
</header>

<!-- ==================== HERO ==================== -->
<section class="hero">
  <h1>Des idées qui illuminent le monde</h1>
  <p>Articles sur la technologie, les voyages, la science et la culture.</p>
  <div class="barre-recherche">
    <input type="text" id="champRecherche" placeholder="Rechercher un article...">
    <button onclick="lancerRecherche()">→</button>
  </div>
</section>

<!-- ==================== CONTENU ==================== -->
<div class="contenu" id="articles">

  <!-- Article à la une -->
  <div id="sectionUne"></div>

  <!-- Titre + filtres -->
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
    <h2 style="font-size: 1.2rem; color: #222;">Derniers articles</h2>
    <div class="filtres" id="filtresCategories">
      <!-- Les boutons de catégorie sont ajoutés par le JS -->
      <button class="filtre actif" onclick="filtrerParCategorie(null, this)">Tous</button>
    </div>
  </div>

  <!-- Grille des articles -->
  <div class="grille" id="grilleArticles"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</div>

<!-- ==================== FOOTER ==================== -->
<footer>
  <p>&copy; 2025 <strong>MinimalBlog</strong> — Projet BD ESISA · Pr. FENNANE SALMA</p>
</footer>

<!-- ==================== POPUP : ÉCRIRE UN ARTICLE ==================== -->
<div class="modal-fond" id="popupEcrire">
  <div class="modal-boite">

    <div class="modal-entete">
      <h3>✏️ Publier un article</h3>
      <button class="btn-fermer" onclick="fermerModal()">✕</button>
    </div>

    <!-- Ligne : catégorie + auteur -->
    <div class="form-ligne">
      <div class="champ">
        <label>Catégorie *</label>
        <select id="champCategorie"></select>
      </div>
      <div class="champ">
        <label>Votre nom *</label>
        <input type="text" id="champAuteur" placeholder="Ex: Jean Dupont">
      </div>
    </div>

    <div class="champ">
      <label>Titre de l'article *</label>
      <input type="text" id="champTitre" placeholder="Un titre accrocheur...">
    </div>

    <div class="champ">
      <label>Lien image <span style="color:#888; font-weight:normal;">(facultatif)</span></label>
      <input type="text" id="champImage" placeholder="https://..." oninput="previewImage(this.value)">
      <!-- Prévisualisation de l'image -->
      <div id="previewImg" style="display:none; margin-top:8px; height:90px; border-radius:5px; overflow:hidden; background:#eee;">
        <img id="imgPreview" style="width:100%; height:100%; object-fit:cover;">
      </div>
    </div>

    <div class="champ">
      <label>Contenu * <span style="color:#888; font-weight:normal;">(séparez les paragraphes par une ligne vide)</span></label>
      <textarea id="champContenu" rows="9" placeholder="Écrivez votre article ici..."></textarea>
    </div>

    <!-- Message d'erreur -->
    <div id="msgErreur" class="alerte alerte-err" style="display:none;"></div>

    <!-- Boutons en bas -->
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:15px;">
      <button class="btn btn-gris" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-bleu" id="btnPublier" onclick="publierArticle()">🚀 Publier</button>
    </div>

  </div>
</div>

<!-- ==================== JS ==================== -->
<script src="js/db.js"></script>
<script>

  // Lance la base de données (localStorage)
  DB.init();

  // Variables globales pour la pagination et les filtres
  var pageCourante   = 1;
  var ARTICLES_PAGE  = 6;
  var categorieFil   = null;   // null = toutes les catégories
  var rechercheFil   = '';     // texte de recherche

  // ============================================================
  // CHARGEMENT DES CATÉGORIES (filtres + select du formulaire)
  // ============================================================
  (function chargerCategories() {
    var filtres  = document.getElementById('filtresCategories');
    var selectCat = document.getElementById('champCategorie');

    DB.getCategories().forEach(function(cat) {
      // Bouton filtre
      var btn = document.createElement('button');
      btn.className = 'filtre';
      btn.textContent = cat.icon + ' ' + cat.nom;
      btn.onclick = function() { filtrerParCategorie(cat.id, this); };
      filtres.appendChild(btn);

      // Option dans le select du formulaire
      selectCat.innerHTML += '<option value="' + cat.id + '">' + cat.icon + ' ' + escapeHtml(cat.nom) + '</option>';
    });
  })();

  // ============================================================
  // ARTICLE À LA UNE
  // ============================================================
  (function afficherUne() {
    var article = DB.getFeatured();
    if (!article) return;

    var cat  = DB.getCategorieById(article.categorie_id);
    var coms = DB.getCommentaires(article.id, true);

    document.getElementById('sectionUne').innerHTML =
      '<p style="font-size:0.78rem; font-weight:bold; color:#3b82f6; text-transform:uppercase; letter-spacing:1px; margin-top:22px; margin-bottom:8px;">✦ À la une</p>' +
      '<div class="une" onclick="window.location=\'article.html?id=' + article.id + '\'">' +
        '<img src="' + escapeHtml(article.image_principale) + '" alt="' + escapeHtml(article.titre) + '" onerror="this.style.display=\'none\'">' +
        '<div class="une-texte">' +
          (cat ? '<span class="etiq etiq-bleu">' + cat.icon + ' ' + escapeHtml(cat.nom) + '</span>' : '') +
          '<h2>' + escapeHtml(article.titre) + '</h2>' +
          '<p class="une-meta">✍️ ' + escapeHtml(article.auteur) + ' &nbsp;|&nbsp; 📅 ' + formatDate(article.date_publication) + ' &nbsp;|&nbsp; 💬 ' + coms.length + ' commentaire(s)</p>' +
          '<p style="margin-top:12px; color:#3b82f6; font-weight:bold; font-size:0.85rem;">Lire l\'article →</p>' +
        '</div>' +
      '</div>';
  })();

  // ============================================================
  // FILTRER PAR CATÉGORIE
  // ============================================================
  function filtrerParCategorie(id, bouton) {
    categorieFil = id;
    pageCourante = 1;
    // Enlever "actif" de tous les boutons puis l'ajouter au bouton cliqué
    document.querySelectorAll('.filtre').forEach(function(b) { b.classList.remove('actif'); });
    bouton.classList.add('actif');
    afficherArticles();
  }

  // ============================================================
  // RECHERCHE
  // ============================================================
  function lancerRecherche() {
    rechercheFil = document.getElementById('champRecherche').value.trim();
    pageCourante = 1;
    afficherArticles();
  }

  // Chercher aussi en appuyant sur Entrée
  document.getElementById('champRecherche').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') lancerRecherche();
    if (this.value === '') { rechercheFil = ''; afficherArticles(); }
  });

  // ============================================================
  // AFFICHER LES ARTICLES
  // ============================================================
  function afficherArticles() {
    // Récupérer les articles publiés (avec filtres)
    var articles = DB.getArticles('publie', categorieFil, rechercheFil || null);

    // Retirer l'article à la une de la liste (si pas de filtre actif)
    var articleUne = DB.getFeatured();
    if (articleUne && !categorieFil && !rechercheFil) {
      articles = articles.filter(function(a) { return a.id !== articleUne.id; });
    }

    var total       = articles.length;
    var totalPages  = Math.ceil(total / ARTICLES_PAGE);
    var pagePart    = articles.slice((pageCourante - 1) * ARTICLES_PAGE, pageCourante * ARTICLES_PAGE);
    var grille      = document.getElementById('grilleArticles');

    // Aucun article trouvé
    if (pagePart.length === 0) {
      grille.innerHTML = '<div class="vide" style="grid-column:1/-1;"><span class="emoji">🔍</span>Aucun article trouvé.</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Générer les cartes HTML
    grille.innerHTML = pagePart.map(function(a) {
      var cat     = DB.getCategorieById(a.categorie_id);
      var coms    = DB.getCommentaires(a.id, true);
      var extrait = a.contenu.replace(/\n/g, ' ').substring(0, 120) + '…';
      var initls  = initials(a.auteur);

      return '' +
        '<div class="carte" onclick="window.location=\'article.html?id=' + a.id + '\'">' +
          '<div class="carte-photo">' +
            (a.image_principale
              ? '<img src="' + escapeHtml(a.image_principale) + '" loading="lazy" onerror="this.parentElement.style.background=\'#eee\';this.remove();">'
              : '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;">📝</div>'
            ) +
            '<span class="carte-categorie">' + (cat ? cat.icon + ' ' + escapeHtml(cat.nom) : 'Divers') + '</span>' +
          '</div>' +
          '<div class="carte-info">' +
            '<div class="carte-titre">' + escapeHtml(a.titre) + '</div>' +
            '<div class="carte-resume">' + escapeHtml(extrait) + '</div>' +
            '<div class="carte-pied">' +
              '<span><span class="initiales">' + initls + '</span>' + escapeHtml(a.auteur) + '</span>' +
              '<span>💬 ' + coms.length + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    // Afficher la pagination
    afficherPagination(totalPages);
  }

  // ============================================================
  // PAGINATION
  // ============================================================
  function afficherPagination(total) {
    var div = document.getElementById('pagination');
    if (total <= 1) { div.innerHTML = ''; return; }

    var html = '';
    for (var i = 1; i <= total; i++) {
      html += '<button class="page-btn ' + (i === pageCourante ? 'actif' : '') + '" onclick="changerPage(' + i + ')">' + i + '</button>';
    }
    div.innerHTML = html;
  }

  function changerPage(n) {
    pageCourante = n;
    afficherArticles();
    // Remonter vers la section articles
    window.scrollTo({ top: document.getElementById('articles').offsetTop - 70, behavior: 'smooth' });
  }

  // Premier affichage
  afficherArticles();

  // ============================================================
  // POPUP : ÉCRIRE UN ARTICLE
  // ============================================================
  function ouvrirModal() {
    document.getElementById('popupEcrire').classList.add('ouvert');
    document.getElementById('champTitre').focus();
  }

  function fermerModal() {
    document.getElementById('popupEcrire').classList.remove('ouvert');
    document.getElementById('msgErreur').style.display = 'none';
  }

  // Prévisualiser l'image
  function previewImage(url) {
    var boite = document.getElementById('previewImg');
    var img   = document.getElementById('imgPreview');
    if (url) {
      boite.style.display = 'block';
      img.src = url;
      img.onerror = function() { boite.style.display = 'none'; };
    } else {
      boite.style.display = 'none';
    }
  }

  // Publier l'article
  function publierArticle() {
    var titre   = document.getElementById('champTitre').value.trim();
    var auteur  = document.getElementById('champAuteur').value.trim();
    var contenu = document.getElementById('champContenu').value.trim();
    var catId   = parseInt(document.getElementById('champCategorie').value);
    var image   = document.getElementById('champImage').value.trim();
    var erreur  = document.getElementById('msgErreur');
    var bouton  = document.getElementById('btnPublier');

    erreur.style.display = 'none';

    // Vérifications
    if (!titre)   { erreur.textContent = '❌ Le titre est obligatoire.';         erreur.style.display = 'block'; return; }
    if (!auteur)  { erreur.textContent = '❌ Le nom de l\'auteur est obligatoire.'; erreur.style.display = 'block'; return; }
    if (!contenu) { erreur.textContent = '❌ Le contenu est obligatoire.';       erreur.style.display = 'block'; return; }

    // Désactiver le bouton pendant la publication
    bouton.disabled = true;
    bouton.textContent = '⏳ En cours…';

    // Ajouter l'article dans la base de données
    var id = DB.addArticle({
      titre: titre, auteur: auteur, contenu: contenu,
      categorie_id: catId, statut: 'publie', image_principale: image
    });

    // Vider le formulaire
    document.getElementById('champTitre').value   = '';
    document.getElementById('champAuteur').value  = '';
    document.getElementById('champContenu').value = '';
    document.getElementById('champImage').value   = '';
    document.getElementById('previewImg').style.display = 'none';
    bouton.disabled = false;
    bouton.textContent = '🚀 Publier';

    fermerModal();
    showNotification('✅ Article publié avec succès !');

    // Aller lire l'article
    setTimeout(function() { window.location.href = 'article.html?id=' + id; }, 700);
  }

  // Fermer le popup avec la touche Echap
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') fermerModal();
  });

  // Fermer le popup en cliquant dehors
  document.getElementById('popupEcrire').addEventListener('click', function(e) {
    if (e.target === this) fermerModal();
  });

</script>
</body>
</html>
