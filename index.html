<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog — Accueil</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card { animation: fadeInUp 0.5s ease both; }
    .card:nth-child(1){animation-delay:0.05s}
    .card:nth-child(2){animation-delay:0.1s}
    .card:nth-child(3){animation-delay:0.15s}
    .card:nth-child(4){animation-delay:0.2s}
    .card:nth-child(5){animation-delay:0.25s}
    .card:nth-child(6){animation-delay:0.3s}

    /* Bouton écrire */
    .btn-write {
      display:inline-flex;align-items:center;gap:0.4rem;
      background:rgba(15,244,198,0.12);border:1px solid rgba(15,244,198,0.35);
      color:var(--teal);padding:0.45rem 1.1rem;border-radius:8px;
      font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;
      cursor:pointer;transition:all 0.2s;
    }
    .btn-write:hover { background:var(--teal);color:var(--navy); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">Minimal<span>Blog</span></a>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="index.html#articles">Articles</a>
    <button class="btn-write" onclick="ouvrirFormArticle()">✏️ Écrire un article</button>
    <a href="admin/login.html" class="btn-admin">⚡ Admin</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Blog actif</div>
    <h1>Des idées qui <em>illuminent</em> le monde</h1>
    <p>Articles sur la technologie, les voyages, la science et la culture — écrits avec passion et précision.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Rechercher un article...">
      <button onclick="rechercherArticles()">→</button>
    </div>
  </div>
</section>

<!-- CONTENU PRINCIPAL -->
<div class="container" id="articles">

  <!-- Article à la une -->
  <div id="featuredSection"></div>

  <!-- Catégories + titre section -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin:2.5rem 0 1rem;flex-wrap:wrap;gap:1rem">
    <h2 style="font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600">
      Derniers articles
    </h2>
    <div class="cats-scroll" id="catsFilter" style="margin:0">
      <button class="cat-pill active" onclick="filtrerCategorie(null,this)">Tous</button>
    </div>
  </div>

  <!-- Grille articles -->
  <div class="articles-grid" id="articlesGrid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>
</div>

<!-- FOOTER -->
<footer>
  <p>&copy; 2025 <strong>MinimalBlog</strong> — Projet BD ESISA · Pr. FENNANE SALMA</p>
</footer>

<!-- ===== MODAL : ÉCRIRE UN ARTICLE ===== -->
<div class="modal-overlay" id="articleOverlay">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <h3>✏️ Publier un article</h3>
      <button class="btn-close" onclick="fermerFormArticle()">✕</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie *</label>
        <select id="wCat" style="width:100%;padding:0.65rem 1rem;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;color:var(--blanc);font-family:'DM Sans',sans-serif;font-size:0.88rem">
        </select>
      </div>
      <div class="form-group" style="display:flex;flex-direction:column;gap:0.5rem">
        <label>Auteur *</label>
        <input type="text" id="wAuteur" placeholder="Votre nom">
      </div>
    </div>

    <div class="form-group">
      <label>Titre de l'article *</label>
      <input type="text" id="wTitre" placeholder="Un titre accrocheur...">
    </div>

    <div class="form-group">
      <label>Image (URL) <span style="color:var(--gris);font-weight:400">(optionnel)</span></label>
      <input type="text" id="wImage" placeholder="https://images.unsplash.com/photo-…"
        oninput="previewWImage(this.value)">
      <div id="wImgPreview" style="margin-top:0.5rem;height:100px;border-radius:8px;overflow:hidden;display:none;background:var(--navy3)">
        <img id="wImgPreviewEl" style="width:100%;height:100%;object-fit:cover">
      </div>
    </div>

    <div class="form-group">
      <label>Contenu * <span style="color:var(--gris);font-weight:400;font-size:0.8rem">— séparez les paragraphes par une ligne vide</span></label>
      <textarea id="wContenu" rows="10" placeholder="Écrivez votre article ici...&#10;&#10;Vous pouvez écrire plusieurs paragraphes en sautant une ligne."></textarea>
    </div>

    <div id="wError" class="alert alert-error" style="display:none"></div>

    <div style="display:flex;gap:0.8rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-secondary" onclick="fermerFormArticle()">Annuler</button>
      <button class="btn btn-primary" id="wBtnPublier" onclick="publierArticle()">🚀 Publier</button>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script>
  DB.init();

  let pageActuelle = 1;
  const PAR_PAGE = 6;
  let categorieActive = null;
  let rechercheActive = '';

  // ---- Charger catégories ----
  (function() {
    const filter = document.getElementById('catsFilter');
    const wCat   = document.getElementById('wCat');
    DB.getCategories().forEach(cat => {
      // Filtre
      const btn = document.createElement('button');
      btn.className = 'cat-pill';
      btn.textContent = `${cat.icon} ${cat.nom}`;
      btn.onclick = function() { filtrerCategorie(cat.id, this); };
      filter.appendChild(btn);
      // Select modal
      wCat.innerHTML += `<option value="${cat.id}">${cat.icon} ${escapeHtml(cat.nom)}</option>`;
    });
  })();

  // ---- Article à la une ----
  (function() {
    const featured = DB.getFeatured();
    if (!featured) return;
    const cat  = DB.getCategorieById(featured.categorie_id);
    const coms = DB.getCommentaires(featured.id, true);

    document.getElementById('featuredSection').innerHTML = `
      <div style="margin-top:2.5rem">
        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem">
          <div style="width:20px;height:2px;background:var(--teal)"></div>
          <span style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal);font-weight:600">À la une</span>
        </div>
        <div class="featured" onclick="window.location='article.html?id=${featured.id}'">
          <span class="featured-badge">✦ À LA UNE</span>
          <img src="${escapeHtml(featured.image_principale)}" alt="${escapeHtml(featured.titre)}"
            onerror="this.parentElement.style.background='linear-gradient(135deg,#1f2937,#374151)'">
          <div class="featured-content">
            <span class="featured-tag">${cat ? escapeHtml(cat.nom) : 'Article'}</span>
            <h2>${escapeHtml(featured.titre)}</h2>
            <div class="featured-meta">
              <span>✍️ ${escapeHtml(featured.auteur)}</span>
              <span>·</span>
              <span>📅 ${formatDate(featured.date_publication)}</span>
              <span>·</span>
              <span>💬 ${coms.length} commentaire${coms.length !== 1 ? 's' : ''}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  })();

  // ---- Filtrer ----
  function filtrerCategorie(id, btn) {
    categorieActive = id; pageActuelle = 1;
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    afficherArticles();
  }

  function rechercherArticles() {
    rechercheActive = document.getElementById('searchInput').value.trim();
    pageActuelle = 1;
    afficherArticles();
  }
  document.getElementById('searchInput').addEventListener('keyup', e => {
    if (e.key === 'Enter') rechercherArticles();
    if (!e.target.value) { rechercheActive = ''; afficherArticles(); }
  });

  // ---- Afficher articles ----
  function afficherArticles() {
    let arts = DB.getArticles('publie', categorieActive, rechercheActive || null);
    const featured = DB.getFeatured();
    if (featured && !categorieActive && !rechercheActive) {
      arts = arts.filter(a => a.id !== featured.id);
    }

    const total      = arts.length;
    const totalPages = Math.ceil(total / PAR_PAGE);
    const page       = arts.slice((pageActuelle - 1) * PAR_PAGE, pageActuelle * PAR_PAGE);
    const grid       = document.getElementById('articlesGrid');

    if (page.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <span class="icon">🔍</span>
        Aucun article trouvé.
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = page.map(a => {
      const cat    = DB.getCategorieById(a.categorie_id);
      const coms   = DB.getCommentaires(a.id, true);
      const extrait = a.contenu.replace(/\n/g, ' ').substring(0, 130) + '…';
      const initls = initials(a.auteur);
      return `
        <div class="card" onclick="window.location='article.html?id=${a.id}'">
          <div class="card-thumb">
            ${a.image_principale
              ? `<img src="${escapeHtml(a.image_principale)}" alt="${escapeHtml(a.titre)}" loading="lazy"
                   onerror="this.parentElement.style.background='linear-gradient(135deg,#1f2937,#374151)';this.remove()">`
              : `<div style="height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy2),var(--navy3));color:var(--gris);font-size:3rem">📝</div>`
            }
            <span class="card-cat">${cat ? `${cat.icon} ${escapeHtml(cat.nom)}` : 'Divers'}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(a.titre)}</div>
            <div class="card-excerpt">${escapeHtml(extrait)}</div>
            <div class="card-footer">
              <div class="card-author">
                <div class="author-avatar">${initls}</div>
                <div>
                  <div class="card-author-name">${escapeHtml(a.auteur)}</div>
                  <div class="card-date">${formatDateShort(a.date_publication)}</div>
                </div>
              </div>
              <span class="read-link" style="display:flex;align-items:center;gap:0.4rem">
                💬 ${coms.length} <span>→</span>
              </span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    afficherPagination(totalPages);
  }

  function afficherPagination(total) {
    const div = document.getElementById('pagination');
    if (total <= 1) { div.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= total; i++) {
      html += `<button class="page-btn ${i === pageActuelle ? 'active' : ''}" onclick="changerPage(${i})">${i}</button>`;
    }
    div.innerHTML = html;
  }

  function changerPage(n) {
    pageActuelle = n;
    afficherArticles();
    window.scrollTo({ top: document.getElementById('articles').offsetTop - 80, behavior: 'smooth' });
  }

  afficherArticles();

  // ===== FORMULAIRE PUBLICATION ARTICLE =====
  function ouvrirFormArticle() {
    document.getElementById('articleOverlay').classList.add('open');
    document.getElementById('wTitre').focus();
  }

  function fermerFormArticle() {
    document.getElementById('articleOverlay').classList.remove('open');
    document.getElementById('wError').style.display = 'none';
  }

  function previewWImage(url) {
    const preview = document.getElementById('wImgPreview');
    const img     = document.getElementById('wImgPreviewEl');
    if (url) {
      preview.style.display = 'block';
      img.src = url;
      img.onerror = () => { preview.style.display = 'none'; };
    } else {
      preview.style.display = 'none';
    }
  }

  function publierArticle() {
    const titre   = document.getElementById('wTitre').value.trim();
    const auteur  = document.getElementById('wAuteur').value.trim();
    const contenu = document.getElementById('wContenu').value.trim();
    const catId   = parseInt(document.getElementById('wCat').value);
    const image   = document.getElementById('wImage').value.trim();
    const errDiv  = document.getElementById('wError');
    const btn     = document.getElementById('wBtnPublier');

    errDiv.style.display = 'none';

    if (!titre)   { errDiv.textContent = '❌ Le titre est obligatoire.';   errDiv.style.display='block'; return; }
    if (!auteur)  { errDiv.textContent = '❌ Le nom de l\'auteur est obligatoire.'; errDiv.style.display='block'; return; }
    if (!contenu) { errDiv.textContent = '❌ Le contenu est obligatoire.'; errDiv.style.display='block'; return; }

    btn.disabled = true;
    btn.textContent = '⏳ Publication…';

    const id = DB.addArticle({
      titre, auteur, contenu,
      categorie_id: catId,
      statut: 'publie',
      image_principale: image
    });

    // Réinitialiser le formulaire
    ['wTitre','wAuteur','wContenu','wImage'].forEach(fId => {
      document.getElementById(fId).value = '';
    });
    document.getElementById('wImgPreview').style.display = 'none';
    btn.disabled = false;
    btn.textContent = '🚀 Publier';

    fermerFormArticle();
    showNotification('✅ Article publié avec succès !');

    // Aller lire l'article
    setTimeout(() => { window.location.href = `article.html?id=${id}`; }, 800);
  }

  // Fermer modal avec Echap
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') fermerFormArticle();
  });
  document.getElementById('articleOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('articleOverlay')) fermerFormArticle();
  });
</script>
</body>
</html>
