<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog — Article</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header>
  <a href="index.html" class="logo">Minimal<span>Blog</span></a>
  <nav>
    <a href="index.html">← Retour au blog</a>
    <a href="admin/login.html" class="btn-admin">⚡ Admin</a>
  </nav>
</header>

<!-- Image de l'article (remplie par le JS) -->
<div id="imageArticle"></div>

<!-- Corps de l'article (rempli par le JS) -->
<div id="corpsArticle"></div>

<!-- ==================== COMMENTAIRES ==================== -->
<div class="com-section" id="sectionCommentaires" style="display:none;">

  <h3 id="titreCommentaires">Commentaires</h3>

  <!-- Formulaire pour écrire un commentaire -->
  <div class="com-formulaire">
    <h4 style="margin-bottom:14px;">💬 Laisser un commentaire</h4>

    <!-- Message de confirmation -->
    <div id="msgOk" class="alerte alerte-ok" style="display:none;">✅ Commentaire publié !</div>

    <div class="form-ligne">
      <div class="champ">
        <label>Pseudo *</label>
        <input type="text" id="champPseudo" placeholder="Votre pseudo" maxlength="50">
      </div>
      <div class="champ">
        <label>Email <span style="color:#888; font-weight:normal;">(facultatif)</span></label>
        <input type="email" id="champEmail" placeholder="votre@email.com">
      </div>
    </div>

    <div class="champ">
      <label>Commentaire *</label>
      <textarea id="champCommentaire" rows="4" placeholder="Partagez votre avis..."></textarea>
    </div>

    <button class="btn btn-bleu" onclick="envoyerCommentaire()">Publier mon commentaire →</button>
  </div>

  <!-- Liste des commentaires (remplie par le JS) -->
  <div id="listeCommentaires"></div>

</div>

<!-- ==================== FOOTER ==================== -->
<footer>
  <p>&copy; 2025 <strong>MinimalBlog</strong> — Projet BD ESISA · Pr. FENNANE SALMA</p>
</footer>

<!-- ==================== JS ==================== -->
<script src="js/db.js"></script>
<script>

  DB.init();

  // Lire l'ID dans l'URL : article.html?id=2
  var params    = new URLSearchParams(window.location.search);
  var articleId = params.get('id');

  // Si pas d'ID, retour à l'accueil
  if (!articleId) window.location.href = 'index.html';

  var article = DB.getArticleById(articleId);

  // ============================================================
  // ARTICLE INTROUVABLE
  // ============================================================
  if (!article || article.statut !== 'publie') {
    document.getElementById('corpsArticle').innerHTML =
      '<div class="vide" style="padding:80px 20px;">' +
        '<span class="emoji">😕</span>' +
        'Article introuvable ou non publié.' +
        '<br><br>' +
        '<a href="index.html" class="btn btn-bleu" style="display:inline-block; margin-top:15px;">← Retour à l\'accueil</a>' +
      '</div>';

  // ============================================================
  // AFFICHER L'ARTICLE
  // ============================================================
  } else {
    document.title = 'MinimalBlog — ' + article.titre;

    var cat  = DB.getCategorieById(article.categorie_id);
    var coms = DB.getCommentaires(article.id, true);

    // -- Image en haut --
    if (article.image_principale) {
      document.getElementById('imageArticle').innerHTML =
        '<div class="article-image">' +
          '<img src="' + escapeHtml(article.image_principale) + '" alt="' + escapeHtml(article.titre) + '" onerror="this.parentElement.style.display=\'none\'">' +
        '</div>';
    }

    // -- Corps de l'article --
    document.getElementById('corpsArticle').innerHTML =
      '<div class="article-corps">' +

        // Catégorie
        (cat ? '<span class="etiq etiq-bleu" style="margin-bottom:12px; display:inline-block;">' + cat.icon + ' ' + escapeHtml(cat.nom) + '</span>' : '') +

        // Titre
        '<h1 style="font-size:clamp(1.4rem, 3vw, 2rem); font-weight:bold; color:#222; margin-bottom:14px; line-height:1.3;">' + escapeHtml(article.titre) + '</h1>' +

        // Méta : auteur, date, commentaires
        '<div class="article-meta">' +
          '<span>' +
            '<span class="initiales">' + initials(article.auteur) + '</span>' +
            '<strong>' + escapeHtml(article.auteur) + '</strong>' +
          '</span>' +
          '<span>📅 ' + formatDate(article.date_publication) + '</span>' +
          '<span>💬 <span id="nbCommentaires">' + coms.length + '</span> commentaire(s)</span>' +
        '</div>' +

        // Texte de l'article (paragraphe par paragraphe)
        '<div class="article-texte">' +
          article.contenu.split('\n').filter(function(p) { return p.trim() !== ''; }).map(function(p) {
            return '<p>' + escapeHtml(p) + '</p>';
          }).join('') +
        '</div>' +

        // Catégorie en bas
        (cat ? '<div style="margin-top:20px; padding-top:14px; border-top:1px solid #e0e0e0;"><span style="font-size:0.8rem; color:#888;">Catégorie : </span><span class="etiq etiq-bleu">' + cat.icon + ' ' + escapeHtml(cat.nom) + '</span></div>' : '') +

      '</div>';

    // Afficher la section commentaires
    document.getElementById('sectionCommentaires').style.display = 'block';
    afficherCommentaires();
  }

  // ============================================================
  // AFFICHER LA LISTE DES COMMENTAIRES
  // ============================================================
  function afficherCommentaires() {
    var coms = DB.getCommentaires(articleId, true);
    var liste = document.getElementById('listeCommentaires');

    // Mettre à jour le titre et le compteur
    document.getElementById('titreCommentaires').textContent = 'Commentaires (' + coms.length + ')';
    var nbSpan = document.getElementById('nbCommentaires');
    if (nbSpan) nbSpan.textContent = coms.length;

    // Aucun commentaire
    if (coms.length === 0) {
      liste.innerHTML = '<div class="vide" style="padding:20px;"><span class="emoji">💬</span>Aucun commentaire pour l\'instant. Soyez le premier !</div>';
      return;
    }

    // Afficher chaque commentaire
    liste.innerHTML = coms.map(function(c) {
      return '' +
        '<div class="com-item">' +
          '<span class="com-auteur">' + escapeHtml(c.pseudo) + '</span>' +
          '<span class="com-date">' + formatDate(c.date_commentaire) + '</span>' +
          '<div class="com-texte">' + escapeHtml(c.contenu) + '</div>' +
        '</div>';
    }).join('');
  }

  // ============================================================
  // ENVOYER UN COMMENTAIRE
  // ============================================================
  function envoyerCommentaire() {
    var pseudo     = document.getElementById('champPseudo').value.trim();
    var email      = document.getElementById('champEmail').value.trim();
    var commentaire = document.getElementById('champCommentaire').value.trim();

    if (!pseudo)      { alert('Le pseudo est obligatoire.'); return; }
    if (!commentaire) { alert('Le commentaire est vide.');   return; }

    // Ajouter le commentaire
    DB.addCommentaire({ article_id: parseInt(articleId), pseudo: pseudo, email: email, contenu: commentaire });

    // Vider les champs
    document.getElementById('champPseudo').value       = '';
    document.getElementById('champEmail').value        = '';
    document.getElementById('champCommentaire').value  = '';

    // Afficher le message de confirmation
    var msgOk = document.getElementById('msgOk');
    msgOk.style.display = 'block';
    setTimeout(function() { msgOk.style.display = 'none'; }, 4000);

    // Rafraîchir la liste
    afficherCommentaires();
  }

</script>
</body>
</html>
