<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog — Article</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .comment-card { animation: fadeInCom 0.4s ease both; }
    @keyframes fadeInCom {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .comment-count-badge {
      display:inline-flex;align-items:center;gap:0.4rem;
      background:rgba(15,244,198,0.1);border:1px solid rgba(15,244,198,0.25);
      color:var(--teal);padding:0.25rem 0.75rem;border-radius:20px;
      font-size:0.78rem;font-weight:700;
    }
    .btn-submit-com {
      display:inline-flex;align-items:center;gap:0.5rem;
      background:var(--teal);color:var(--navy);
      border:none;padding:0.7rem 1.5rem;border-radius:8px;
      font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;
      cursor:pointer;transition:opacity 0.2s;
    }
    .btn-submit-com:disabled { opacity:0.5;cursor:not-allowed; }
    .btn-submit-com:hover:not(:disabled) { opacity:0.85; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Minimal<span>Blog</span></a>
  <nav>
    <a href="index.html">← Retour au blog</a>
    <a href="admin/login.html" class="btn-admin">⚡ Admin</a>
  </nav>
</header>

<!-- Article hero image -->
<div id="articleHero"></div>

<!-- Article body -->
<div id="articleBody">
  <div class="empty-state" style="padding:6rem 2rem">
    <span class="icon" style="font-size:2rem">⏳</span>
    Chargement de l'article…
  </div>
</div>

<!-- Comments -->
<div class="comments-box" id="commentsBox" style="display:none">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
    <h3 style="margin:0" id="commentsTitle">Commentaires</h3>
    <span class="comment-count-badge" id="comCount">0</span>
  </div>

  <!-- Formulaire -->
  <div class="comment-form-card">
    <h4>💬 Laisser un commentaire</h4>
    <div id="alertSuccess" class="alert alert-success" style="display:none">
      ✅ Commentaire publié ! Il est maintenant visible.
    </div>
    <div id="alertError" class="alert alert-error" style="display:none">
      ❌ Erreur lors de la publication. Réessayez.
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Pseudo *</label>
        <input type="text" id="pseudo" placeholder="Votre pseudo" maxlength="50">
      </div>
      <div class="form-group">
        <label>Email <span style="color:var(--gris);font-weight:400">(optionnel)</span></label>
        <input type="email" id="email" placeholder="votre@email.com">
      </div>
    </div>
    <div class="form-group">
      <label>Commentaire *</label>
      <textarea id="contenu" rows="4" placeholder="Partagez votre avis sur cet article..."></textarea>
    </div>
    <button class="btn-submit-com" id="btnSubmit" onclick="soumettre()">
      Publier mon commentaire →
    </button>
  </div>

  <!-- Liste commentaires -->
  <div id="commentsList"></div>
</div>

<footer>
  <p>&copy; 2025 <strong>MinimalBlog</strong> — Projet BD ESISA · Pr. FENNANE SALMA</p>
</footer>

<script src="js/api.js"></script>
<script>
  const params    = new URLSearchParams(window.location.search);
  const articleId = params.get('id');
  if (!articleId) window.location.href = 'index.html';

  // ---- Chargement de l'article ----
  (async function() {
    const article = await DB.getArticleById(articleId);

    if (!article || article.statut !== 'publie') {
      document.getElementById('articleBody').innerHTML = `
        <div class="empty-state" style="padding:6rem 2rem">
          <span class="icon">😕</span>
          Article introuvable ou non publié.
          <br><br>
          <a href="index.html" class="btn btn-primary mt-1">← Retour à l'accueil</a>
        </div>`;
      return;
    }

    document.title = `MinimalBlog — ${article.titre}`;
    const cat  = await DB.getCategorieById(article.categorie_id);
    const coms = await DB.getCommentaires(article.id, true);

    // Hero image
    document.getElementById('articleHero').innerHTML = `
      <div class="article-hero">
        ${article.image_principale
          ? `<img src="${escapeHtml(article.image_principale)}" alt="${escapeHtml(article.titre)}"
               onerror="this.style.display='none'">`
          : `<div style="height:100%;background:linear-gradient(135deg,var(--navy2),var(--navy3))"></div>`
        }
        <div class="article-hero-content" style="padding:3rem 2rem">
          ${cat ? `<span style="display:inline-block;background:rgba(15,244,198,0.15);border:1px solid rgba(15,244,198,0.3);color:var(--teal);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:0.3rem 0.9rem;border-radius:20px;margin-bottom:1rem">${cat.icon} ${escapeHtml(cat.nom)}</span>` : ''}
          <h1 style="font-family:'Fraunces',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;line-height:1.2;margin-bottom:1rem;color:white;max-width:800px;margin:0 auto 1rem">${escapeHtml(article.titre)}</h1>
        </div>
      </div>
    `;

    // Body
    document.getElementById('articleBody').innerHTML = `
      <div class="article-body">
        <div class="article-meta-bar">
          <div style="display:flex;align-items:center;gap:0.6rem">
            <div class="author-avatar">${initials(article.auteur)}</div>
            <span style="font-weight:600;color:var(--blanc);font-size:0.9rem">${escapeHtml(article.auteur)}</span>
          </div>
          <span>📅 ${formatDate(article.date_publication)}</span>
          <span>💬 <span id="metaComCount">${coms.length}</span> commentaire${coms.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="article-content">
          ${article.contenu.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('')}
        </div>
        ${cat ? `<div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)">
          <span style="font-size:0.8rem;color:var(--gris);margin-right:0.5rem">Catégorie :</span>
          <span class="badge badge-cat">${cat.icon} ${escapeHtml(cat.nom)}</span>
        </div>` : ''}
      </div>
    `;

    // Afficher la section commentaires
    document.getElementById('commentsBox').style.display = 'block';
    await afficherCommentaires();
  })();

  // ---- Afficher les commentaires ----
  async function afficherCommentaires() {
    const coms = await DB.getCommentaires(articleId, true);
    const div  = document.getElementById('commentsList');

    // Mettre à jour les compteurs
    const badge = document.getElementById('comCount');
    if (badge) badge.textContent = `${coms.length} commentaire${coms.length !== 1 ? 's' : ''}`;
    document.getElementById('commentsTitle').textContent = `Commentaires`;

    const metaCount = document.getElementById('metaComCount');
    if (metaCount) metaCount.textContent = coms.length;

    if (coms.length === 0) {
      div.innerHTML = `<div class="empty-state" style="padding:2rem">
        <span class="icon">💬</span>
        Aucun commentaire encore. Soyez le premier à réagir !
      </div>`;
      return;
    }

    div.innerHTML = coms.map((c, i) => `
      <div class="comment-card" style="animation-delay:${i * 0.06}s">
        <div class="comment-head">
          <div class="comment-avatar">${initials(c.pseudo)}</div>
          <span class="comment-name">${escapeHtml(c.pseudo)}</span>
          <span class="comment-date">${formatDate(c.date_commentaire)}</span>
        </div>
        <div class="comment-text">${escapeHtml(c.contenu)}</div>
      </div>
    `).join('');
  }

  // ---- Soumettre un commentaire ----
  async function soumettre() {
    const pseudo  = document.getElementById('pseudo').value.trim();
    const email   = document.getElementById('email').value.trim();
    const contenu = document.getElementById('contenu').value.trim();
    const btn     = document.getElementById('btnSubmit');
    const alertOk = document.getElementById('alertSuccess');
    const alertErr= document.getElementById('alertError');

    alertOk.style.display = 'none';
    alertErr.style.display = 'none';

    if (!pseudo)  { alert('Le pseudo est obligatoire.'); return; }
    if (!contenu) { alert('Le commentaire est vide.');   return; }

    btn.disabled = true;
    btn.textContent = 'Publication…';

    try {
      await DB.addCommentaire({ article_id: parseInt(articleId), pseudo, email, contenu });

      // Vider le formulaire
      document.getElementById('pseudo').value  = '';
      document.getElementById('email').value   = '';
      document.getElementById('contenu').value = '';

      // Confirmation
      alertOk.style.display = 'block';
      setTimeout(() => { alertOk.style.display = 'none'; }, 5000);

      // Rafraîchir la liste immédiatement
      await afficherCommentaires();
    } catch(e) {
      alertErr.style.display = 'block';
      alertErr.textContent = '❌ ' + (e.message || 'Erreur lors de la publication.');
      setTimeout(() => { alertErr.style.display = 'none'; }, 5000);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Publier mon commentaire →';
    }
  }

  // Entrée = soumettre
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') soumettre();
  });
</script>
</body>
</html>
